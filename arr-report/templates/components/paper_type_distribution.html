<div class="px-4 py-5 sm:p-6">
    <div class="flex flex-col md:flex-row">
        <div class="w-full md:w-1/2">
            <canvas id="paper-type-chart" style="max-height: 300px;"></canvas>
        </div>
        <div class="w-full md:w-1/2 mt-4 md:mt-0">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Paper Type</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Count</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">%</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                    {% set total = paper_type_distribution.counts | sum %}
                    {% for i in range(paper_type_distribution.labels | length) %}
                    <tr>
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{{ paper_type_distribution.labels[i] }}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ paper_type_distribution.counts[i] }}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ "%.1f"|format(paper_type_distribution.counts[i] / total * 100) }}%</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const initPaperTypeChart = function() {
        const ctx = document.getElementById('paper-type-chart');
        if (!ctx) return;
        const labels = {{ paper_type_distribution.labels | tojson }};
        const counts = {{ paper_type_distribution.counts | tojson }};
        if (!labels.length) { ctx.parentNode.innerHTML = '<div class="text-center py-8 text-gray-500">No data.</div>'; return; }
        const colors = ['rgba(54,162,235,0.7)','rgba(255,99,132,0.7)','rgba(75,192,192,0.7)','rgba(255,206,86,0.7)','rgba(153,102,255,0.7)','rgba(255,159,64,0.7)'];
        const borders = colors.map(c => c.replace('0.7','1'));
        new Chart(ctx, {
            type: 'doughnut',
            data: {labels, datasets:[{data: counts, backgroundColor: colors.slice(0,labels.length), borderColor: borders.slice(0,labels.length), borderWidth:1}]},
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: {
                    legend: {position:'right', labels:{boxWidth:15,padding:15}},
                    tooltip: {callbacks: {label(ctx) {
                        const total = ctx.dataset.data.reduce((a,b)=>a+b,0);
                        return `${ctx.label}: ${ctx.formattedValue} (${Math.round(ctx.raw/total*100)}%)`;
                    }}}
                }
            }
        });
    };
    const analyticsTab = document.querySelector('[data-tab="analytics-tab"]');
    if (analyticsTab) analyticsTab.addEventListener('click', () => setTimeout(initPaperTypeChart, 100));
    if (document.getElementById('analytics-tab') && document.getElementById('analytics-tab').classList.contains('active'))
        setTimeout(initPaperTypeChart, 100);
});
</script>
