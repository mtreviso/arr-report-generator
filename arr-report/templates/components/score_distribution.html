<div id="score-distribution-container" class="px-4 py-5 sm:p-6">
    <canvas id="score-distribution-chart" style="max-height: 400px;"></canvas>
</div>

<script>
function renderScoreDistributionChart() {
    const ctx = document.getElementById('score-distribution-chart');
    if (!ctx) return;
    const overallCounts = {{ histogram_data.overall_assessment.counts | tojson }};
    const metaCounts   = {{ histogram_data.meta_review.counts | tojson }};
    const overallLabels = {{ histogram_data.overall_assessment.labels | tojson }};
    const metaLabels    = {{ histogram_data.meta_review.labels | tojson }};

    window.scoreChart = new Chart(ctx.getContext('2d'), {
        type: 'line',
        data: {
            labels: overallLabels,
            datasets: [
                {
                    label: 'Overall Assessment',
                    data: overallCounts,
                    borderColor: 'rgba(59,130,246,1)', backgroundColor: 'rgba(59,130,246,0.1)',
                    tension: 0.1, fill: true
                },
                {
                    label: 'Meta Review Score',
                    data: metaLabels.map((lbl,i) => ({x: lbl, y: metaCounts[i]})),
                    borderColor: 'rgba(220,38,38,1)', backgroundColor: 'rgba(220,38,38,0.1)',
                    tension: 0.1, fill: true,
                    parsing: {xAxisKey: 'x', yAxisKey: 'y'}
                }
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: true, aspectRatio: 2.5,
            plugins: {
                legend: {position: 'top'},
                tooltip: {
                    callbacks: {
                        title(ctx) {
                            const dp = ctx[0].raw;
                            return 'Score: ' + (typeof dp === 'object' ? dp.x : overallLabels[ctx[0].dataIndex]);
                        },
                        label(ctx) {
                            const v = typeof ctx.raw === 'object' ? ctx.raw.y : ctx.raw;
                            return `${ctx.dataset.label}: ${v} papers`;
                        }
                    }
                }
            },
            scales: {
                y: {beginAtZero: true, title: {display: true, text: 'Number of Papers'}, ticks: {stepSize: 1}},
                x: {type: 'linear', title: {display: true, text: 'Score'}}
            }
        }
    });
}
</script>
