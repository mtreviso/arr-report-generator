<div class="px-4 py-5 sm:p-6">
    <div id="review-completion-chart-container">
        <canvas id="review-completion-chart" style="max-height:400px; height:400px;"></canvas>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const initReviewCompletionChart = function() {
        const ctx = document.getElementById('review-completion-chart');
        if (!ctx) return;
        const reviewData = {{ review_completion_data | tojson }};
        if (!reviewData.length) {
            document.getElementById('review-completion-chart-container').innerHTML =
                '<div class="text-center py-8 text-gray-500">No data available.</div>';
            return;
        }
        const labels = reviewData.map(d => d.name);
        const data   = reviewData.map(d => d.percentage);
        const bg  = data.map(p => p>=100?'rgba(34,197,94,0.7)':p>=75?'rgba(59,130,246,0.7)':p>=50?'rgba(234,179,8,0.7)':'rgba(239,68,68,0.7)');
        const brd = data.map(p => p>=100?'rgba(34,197,94,1)':p>=75?'rgba(59,130,246,1)':p>=50?'rgba(234,179,8,1)':'rgba(239,68,68,1)');
        new Chart(ctx, {
            type:'bar',
            data:{labels, datasets:[{label:'Review Completion (%)', data, backgroundColor:bg, borderColor:brd, borderWidth:1, barPercentage:0.8, maxBarThickness:30}]},
            options:{
                indexAxis:'y', responsive:true, maintainAspectRatio:false,
                scales:{
                    x:{beginAtZero:true, max:100, title:{display:true,text:'Completion %'}, ticks:{callback:v=>v+'%'}},
                    y:{title:{display:true,text:'Area Chair'}}
                },
                plugins:{tooltip:{callbacks:{label(ctx){return `Completion: ${ctx.formattedValue}%`;}}}}
            }
        });
    };
    const analyticsTab = document.querySelector('[data-tab="analytics-tab"]');
    if (analyticsTab) analyticsTab.addEventListener('click', () => setTimeout(initReviewCompletionChart, 100));
    if (document.getElementById('analytics-tab') && document.getElementById('analytics-tab').classList.contains('active'))
        setTimeout(initReviewCompletionChart, 100);
});
</script>
