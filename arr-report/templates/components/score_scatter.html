<div class="px-4 py-5 sm:p-6">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
            <h3 class="text-base font-medium text-gray-700 mb-2">Overall vs Meta-Review Scatter</h3>
            <div style="height:300px;"><canvas id="score-scatter-chart"></canvas></div>
        </div>
        <div>
            <h3 class="text-base font-medium text-gray-700 mb-2">Score Difference Distribution (Meta − Avg)</h3>
            <div style="height:300px;"><canvas id="score-difference-chart"></canvas></div>
            <p class="text-sm text-gray-500 mt-2 text-center">Positive = meta higher than average review.</p>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const initScoreCharts = function() {
        const scatterCtx = document.getElementById('score-scatter-chart');
        const diffCtx    = document.getElementById('score-difference-chart');
        if (!scatterCtx || !diffCtx) return;
        const scatterData = {{ score_scatter_data.scatter | tojson }};
        const diffData    = {{ score_scatter_data.differences | tojson }};
        if (!scatterData.length) {
            scatterCtx.parentNode.innerHTML = '<div class="text-center py-8 text-gray-500">No data.</div>';
            diffCtx.parentNode.innerHTML = '';
            return;
        }
        new Chart(scatterCtx, {
            type: 'scatter',
            data: {datasets:[{label:'Papers', data: scatterData.map(d=>({x:d.x,y:d.y})),
                backgroundColor:'rgba(59,130,246,0.7)', borderColor:'rgba(59,130,246,1)', pointRadius:5, pointHoverRadius:7}]},
            options: {
                responsive:true, maintainAspectRatio:false,
                scales: {
                    x: {title:{display:true,text:'Average Overall Assessment'}, min:1, max:5, ticks:{stepSize:0.5}},
                    y: {title:{display:true,text:'Meta-Review Score'}, min:1, max:5, ticks:{stepSize:0.5}}
                },
                plugins: {tooltip: {callbacks: {label(ctx) {
                    const p = scatterData[ctx.dataIndex];
                    return `Paper ${p.paper}: Review ${p.x.toFixed(1)}, Meta ${p.y.toFixed(1)}`;
                }}}}
            }
        });
        new Chart(diffCtx, {
            type: 'bar',
            data: {labels: diffData.labels, datasets:[{
                label:'Papers', data: diffData.counts,
                backgroundColor(ctx) { const v=parseFloat(ctx.chart.data.labels[ctx.dataIndex]); return v>0?'rgba(34,197,94,0.7)':v<0?'rgba(239,68,68,0.7)':'rgba(107,114,128,0.7)'; },
                borderColor(ctx) { const v=parseFloat(ctx.chart.data.labels[ctx.dataIndex]); return v>0?'rgba(34,197,94,1)':v<0?'rgba(239,68,68,1)':'rgba(107,114,128,1)'; },
                borderWidth:1
            }]},
            options: {
                responsive:true, maintainAspectRatio:false,
                scales: {
                    x: {title:{display:true,text:'Score Difference (Meta − Avg)'}},
                    y: {beginAtZero:true, title:{display:true,text:'Papers'}, ticks:{stepSize:1}}
                }
            }
        });
    };
    const analyticsTab = document.querySelector('[data-tab="analytics-tab"]');
    if (analyticsTab) analyticsTab.addEventListener('click', () => setTimeout(initScoreCharts, 100));
    if (document.getElementById('analytics-tab') && document.getElementById('analytics-tab').classList.contains('active'))
        setTimeout(initScoreCharts, 100);
});
</script>
