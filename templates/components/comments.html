<style>
    .markdown-content { font-size: 0.75rem; line-height: 1.6; word-wrap: break-word; overflow-wrap: break-word; }
    .markdown-content p { margin-top: 0.5em; margin-bottom: 0.5em; }
    .markdown-content h1,.markdown-content h2,.markdown-content h3 { margin-top:1.5em; margin-bottom:0.5em; font-weight:600; }
    .markdown-content h1{font-size:1.5em;}.markdown-content h2{font-size:1.25em;}.markdown-content h3{font-size:1.125em;}
    .markdown-content ul,.markdown-content ol { margin-top:0.5em; margin-bottom:0.5em; padding-left:1.5em; }
    .markdown-content ul{list-style-type:disc;}.markdown-content ol{list-style-type:decimal;}
    .markdown-content li{margin-top:0.25em;margin-bottom:0.25em;}
    .markdown-content code { font-family:monospace; padding:0.2em 0.4em; background:rgba(175,184,193,0.2); border-radius:0.25em; font-size:0.9em; white-space:pre-wrap; }
    .markdown-content pre { padding:1em; margin:0.5em 0; background:#f6f8fa; border-radius:0.375em; overflow-x:auto; white-space:pre; }
    .markdown-content pre code { background:transparent; padding:0; }
    .markdown-content blockquote { padding-left:1em; border-left:0.25em solid #d1d5db; color:#6b7280; margin:0.5em 0; }
    .markdown-content a { color:#3b82f6; text-decoration:underline; }
    .markdown-content table { border-collapse:collapse; width:100%; margin:1em 0; }
    .markdown-content table th,.markdown-content table td { border:1px solid #d1d5db; padding:0.5em; }
    .markdown-content table th { background:#f3f4f6; }
    .comments-page-btn { transition: background-color 0.15s ease, color 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease, transform 0.05s ease; }
    .comments-page-btn:hover:not(:disabled) { background:#f5f7ff !important; color:#4338ca !important; border-color:#c7d2fe !important; box-shadow:0 1px 3px rgba(79,70,229,0.12); }
    .comments-page-btn:active:not(:disabled) { transform:translateY(1px); }
    .comments-page-btn:focus-visible { outline:none; box-shadow:0 0 0 3px rgba(99,102,241,0.18); }
</style>

<div class="px-4 py-5 sm:p-6">
    <div class="mb-6 bg-gray-50 p-4 rounded-lg">
        <h3 class="text-sm font-semibold text-gray-700 uppercase tracking-wide mb-3">Filters</h3>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div>
                <label class="block text-xs font-medium text-gray-600 mb-1">Paper #</label>
                <select id="paper-filter" class="bg-white border border-gray-300 rounded-md shadow-sm py-2 px-3 text-xs w-full focus:outline-none">
                    <option value="all">All Papers</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-600 mb-1">Comment Type</label>
                <select id="type-filter" class="bg-white border border-gray-300 rounded-md shadow-sm py-2 px-3 text-xs w-full focus:outline-none">
                    <option value="all">All Types</option>
                    <option value="Review Issue">Review Issues</option>
                    <option value="Meta Review Issue">Meta Review Issues</option>
                    <option value="Author-Editor Confidential">Author-Editor Confidential</option>
                    <option value="Confidential Comment">Confidential Comments</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-600 mb-1">Role</label>
                <select id="role-filter" class="bg-white border border-gray-300 rounded-md shadow-sm py-2 px-3 text-xs w-full focus:outline-none">
                    <option value="all">All Roles</option>
                    <option value="Author">Author</option>
                    <option value="Reviewer">Reviewer</option>
                    <option value="Area Chair">Area Chair</option>
                    <option value="Senior Area Chair">Senior Area Chair</option>
                    <option value="Program Chair">Program Chair</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-600 mb-1">Per page</label>
                <select id="comments-per-page" class="bg-white border border-gray-300 rounded-md shadow-sm py-2 px-3 text-xs w-full focus:outline-none">
                    <option value="10">10</option>
                    <option value="20">20</option>
                    <option value="30" selected>30</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                </select>
            </div>
        </div>
    </div>

    <div id="comments-threaded">
        <div id="no-comments-message" class="hidden text-center py-8 text-gray-500">No comments match the selected filters.</div>
    </div>

    <div id="pagination-container" class="mt-6 flex justify-center">
        <div class="inline-flex rounded-md shadow-sm">
            <button id="prev-page" class="comments-page-btn px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-l-md">Previous</button>
            <div id="page-numbers" class="flex"></div>
            <button id="next-page" class="comments-page-btn px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-r-md">Next</button>
        </div>
    </div>
</div>

<script>
(function() {
    function esc(v) { return window.ReportCommon.escapeHtml(v ?? ''); }
    function typeBadge(type) {
        if (type === 'Review Issue') return '<span class="px-2 py-1 text-xs rounded-full bg-red-100 text-red-800 mr-2">'+esc(type)+'</span>';
        if (type === 'Meta Review Issue') return '<span class="px-2 py-1 text-xs rounded-full bg-orange-100 text-orange-800 mr-2">'+esc(type)+'</span>';
        if (type === 'Author-Editor Confidential') return '<span class="px-2 py-1 text-xs rounded-full bg-yellow-100 text-yellow-800 mr-2">'+esc(type)+'</span>';
        return '<span class="px-2 py-1 text-xs rounded-full bg-blue-100 text-blue-800 mr-2">'+esc(type || 'Comment')+'</span>';
    }
    function authorHtml(comment) {
        if (comment.AuthorName && comment.AuthorID) {
            return '<a href="https://openreview.net/profile?id='+encodeURIComponent(comment.AuthorID)+'" target="_blank" class="text-gray-700 hover:underline" style="text-decoration:none;">'+esc(comment.AuthorName)+'</a><span class="text-gray-400"> ('+esc(comment.Role || '')+')</span>';
        }
        if (comment.AuthorName) {
            return esc(comment.AuthorName) + ' <span class="text-gray-400">('+esc(comment.Role || '')+')</span>';
        }
        return esc(comment.Role || '');
    }
    function renderCommentItem(item) {
        const c = item.comment;
        const bgColor = item.level % 2 === 0 ? 'bg-gray-50' : 'bg-white';
        return '<div class="comment-thread mb-3 '+bgColor+' border-l-4 border-gray-200 rounded-lg shadow-sm overflow-hidden comment-item" style="margin-left: '+(item.level * 20)+'px" data-paper="'+esc(c['Paper #'])+'" data-type="'+esc(c.Type)+'" data-role="'+esc(c.Role)+'">' +
            '<div class="px-4 py-3">' +
                '<div class="flex justify-between items-start">' +
                    '<div>' +
                        typeBadge(c.Type) +
                        '<span class="text-xs font-medium text-gray-700">'+authorHtml(c)+'</span>' +
                        '<span class="text-xs text-gray-400 ml-2">'+esc(c.Date || '')+'</span>' +
                    '</div>' +
                    '<a href="'+esc(c.Link || '#')+'" target="_blank" class="text-indigo-600 hover:text-indigo-900 text-xs flex-shrink-0 ml-4">View on OpenReview ↗</a>' +
                '</div>' +
                '<div class="mt-2 markdown-content comment-content">'+window.ReportCommon.markdownToHtml(c.Content || '')+'</div>' +
            '</div>' +
        '</div>';
    }
    function buildPaperTrees(comments) {
        const papers = new Map();
        comments.forEach((comment, idx) => {
            const paperKey = String(comment['Paper #']);
            if (!papers.has(paperKey)) papers.set(paperKey, []);
            papers.get(paperKey).push({ ...comment, __index: idx });
        });
        const result = [];
        Array.from(papers.keys()).sort((a,b)=>Number(a)-Number(b)).forEach(paperKey => {
            const list = papers.get(paperKey);
            const byId = new Map();
            list.forEach(c => byId.set(c.NoteId, { comment: c, children: [] }));
            const roots = [];
            list.forEach(c => {
                const node = byId.get(c.NoteId);
                const parent = c.ReplyTo && byId.get(c.ReplyTo);
                if (parent) parent.children.push(node);
                else roots.push(node);
            });
            const flat = [];
            const walk = (node, level) => {
                flat.push({ comment: node.comment, level });
                node.children.forEach(child => walk(child, level + 1));
            };
            roots.forEach(root => walk(root, 0));
            result.push({ paper_num: paperKey, flat });
        });
        return result;
    }

    function initComments() {
        const comments = window.ReportCommon.parseJsonScript('comments-json') || [];
        const paperFilter   = document.getElementById('paper-filter');
        const typeFilter    = document.getElementById('type-filter');
        const roleFilter    = document.getElementById('role-filter');
        const perPageSelect = document.getElementById('comments-per-page');
        const threaded      = document.getElementById('comments-threaded');
        const noMsg         = document.getElementById('no-comments-message');
        const pageNumbers   = document.getElementById('page-numbers');
        const prevBtn       = document.getElementById('prev-page');
        const nextBtn       = document.getElementById('next-page');
        const pagDiv        = document.getElementById('pagination-container');

        let currentPage = 1;
        let commentsPerPage = parseInt(perPageSelect.value, 10) || 30;
        let totalPages = 1;
        let visibleComments = [];
        let grouped = [];

        const paperCounts = {};
        comments.forEach(item => {
            const p = String(item['Paper #']);
            paperCounts[p] = (paperCounts[p] || 0) + 1;
        });
        Array.from(new Set(comments.map(c => String(c['Paper #'])))).sort((a,b)=>Number(a)-Number(b)).forEach(p => {
            const opt = document.createElement('option');
            opt.value = p;
            opt.textContent = `Paper #${p} (${paperCounts[p] || 0})`;
            paperFilter.appendChild(opt);
        });

        const knownTypes = new Set(['all', 'Review Issue', 'Meta Review Issue', 'Author-Editor Confidential', 'Confidential Comment']);
        Array.from(new Set(comments.map(c => c.Type).filter(Boolean))).sort((a,b)=>String(a).localeCompare(String(b))).forEach(t => {
            if (knownTypes.has(t)) return;
            const opt = document.createElement('option');
            opt.value = t;
            opt.textContent = t;
            typeFilter.appendChild(opt);
        });

        const knownRoles = new Set(['all', 'Author', 'Reviewer', 'Area Chair', 'Senior Area Chair', 'Program Chair']);
        Array.from(new Set(comments.map(c => c.Role).filter(Boolean))).sort((a,b)=>String(a).localeCompare(String(b))).forEach(r => {
            if (knownRoles.has(r)) return;
            const opt = document.createElement('option');
            opt.value = r;
            opt.textContent = r;
            roleFilter.appendChild(opt);
        });

        function updatePageNumbers() {
            pageNumbers.innerHTML = '';
            const start = Math.max(1, currentPage - 2);
            const end = Math.min(totalPages, start + 4);
            for (let i = start; i <= end; i++) {
                const btn = document.createElement('button');
                btn.textContent = i;
                btn.className = 'comments-page-btn px-4 py-2 text-sm font-medium border border-gray-300 ' +
                    (i === currentPage ? 'bg-indigo-600 text-white z-10 border-indigo-600 shadow-sm shadow-indigo-200/60' : 'bg-white text-gray-700');
                btn.addEventListener('click', () => { currentPage = i; renderPage(); });
                pageNumbers.appendChild(btn);
            }
        }

        function renderPage() {
            threaded.innerHTML = '';
            threaded.appendChild(noMsg);

            const start = (currentPage - 1) * commentsPerPage;
            const end = Math.min(start + commentsPerPage, visibleComments.length);
            const pageSlice = visibleComments.slice(start, end);
            const byPaper = new Map();
            pageSlice.forEach(item => {
                const p = String(item.comment['Paper #']);
                if (!byPaper.has(p)) byPaper.set(p, []);
                byPaper.get(p).push(item);
            });

            Array.from(byPaper.keys()).sort((a,b)=>Number(a)-Number(b)).forEach(paperNum => {
                const section = document.createElement('div');
                section.className = 'paper-section border-t border-gray-200 pt-4 mt-4 first:border-t-0 first:pt-0 first:mt-0';
                section.setAttribute('data-paper', paperNum);
                section.innerHTML = '<h3 class="text-lg font-semibold text-gray-800 mb-2">Paper #'+esc(paperNum)+'</h3>' + byPaper.get(paperNum).map(renderCommentItem).join('');
                threaded.appendChild(section);
            });

            prevBtn.disabled = currentPage <= 1;
            nextBtn.disabled = currentPage >= totalPages;
            updatePageNumbers();
        }

        function filterComments() {
            const selPaper = paperFilter.value;
            const selType  = typeFilter.value;
            const selRole  = roleFilter.value;
            grouped = buildPaperTrees(comments);
            visibleComments = [];
            grouped.forEach(paper => {
                paper.flat.forEach(item => {
                    const pm = selPaper === 'all' || String(item.comment['Paper #']) === selPaper;
                    const tm = selType === 'all' || String(item.comment.Type || '') === selType;
                    const rm = selRole === 'all' || String(item.comment.Role || '') === selRole;
                    if (pm && tm && rm) visibleComments.push(item);
                });
            });
            totalPages = Math.max(1, Math.ceil(visibleComments.length / commentsPerPage));
            currentPage = 1;
            if (visibleComments.length === 0) {
                noMsg.classList.remove('hidden');
                threaded.innerHTML = '';
                threaded.appendChild(noMsg);
                pagDiv.classList.add('hidden');
            } else {
                noMsg.classList.add('hidden');
                pagDiv.classList.remove('hidden');
                renderPage();
            }
        }

        paperFilter.addEventListener('change', filterComments);
        typeFilter.addEventListener('change', filterComments);
        roleFilter.addEventListener('change', filterComments);
        perPageSelect.addEventListener('change', function() {
            commentsPerPage = parseInt(this.value, 10) || 30;
            totalPages = Math.max(1, Math.ceil(visibleComments.length / commentsPerPage));
            currentPage = 1;
            if (visibleComments.length) renderPage();
        });
        prevBtn.addEventListener('click', () => { if (currentPage > 1) { currentPage--; renderPage(); } });
        nextBtn.addEventListener('click', () => { if (currentPage < totalPages) { currentPage++; renderPage(); } });

        if (!comments.length) {
            noMsg.textContent = 'No comments found.';
        }
        filterComments();
    }

    document.addEventListener('report:tabshown', function(event) {
        if (event.detail.tabId !== 'comments-tab') return;
        window.ReportCommon.initOnce('comments-tab-render', initComments);
    });
})();
</script>
