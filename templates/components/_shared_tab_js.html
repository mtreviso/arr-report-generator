<script>
    document.addEventListener('DOMContentLoaded', function() {
        // --- Tab navigation ---
        const tabButtons = document.querySelectorAll('.tab-button');
        const tabContents = document.querySelectorAll('.tab-content');
        tabButtons.forEach(button => {
            button.addEventListener('click', () => {
                tabButtons.forEach(btn => {
                    btn.classList.remove('active', 'border-indigo-500', 'text-indigo-600');
                    btn.classList.add('border-transparent', 'text-gray-500');
                });
                tabContents.forEach(content => content.classList.remove('active'));
                button.classList.add('active', 'border-indigo-500', 'text-indigo-600');
                button.classList.remove('border-transparent', 'text-gray-500');
                const tabId = button.getAttribute('data-tab');
                document.getElementById(tabId).classList.add('active');
                if (tabId === 'analytics-tab') {
                    setTimeout(() => { if (window.scoreChart) window.scoreChart.resize(); }, 10);
                }
            });
        });

        // --- DataTables: papers ---
        // (customized per report in the including template)

        // --- Markdown for comments ---
        document.querySelectorAll('.comment-content').forEach(function(el) {
            const raw = el.textContent;
            el.innerHTML = (typeof marked !== 'undefined') ? marked.parse(raw) : raw.replace(/\n/g, '<br>');
        });

        // --- Analytics charts ---
        initAllAnalyticsCharts();
    });

    function initAllAnalyticsCharts() {
        renderScoreDistributionChart();
        if (typeof initPaperTypeChart === 'function') initPaperTypeChart();
        if (typeof initReviewCompletionChart === 'function') initReviewCompletionChart();
        if (typeof initScoreCharts === 'function') initScoreCharts();
    }
</script>
